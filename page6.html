<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Wish Cannon — Akshu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#03030d;--purple:#7b4fd4;--violet:#a87ee0;
  --lilac:#d4b8f0;--pale:#ede4ff;
}
body{background:var(--deep);height:100vh;overflow:hidden;font-family:'Cormorant Garamond',serif;color:var(--pale);}

#bg-canvas{position:fixed;inset:0;z-index:0;}
#fw-canvas{position:fixed;inset:0;z-index:6;pointer-events:none;}

#nebula{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 70%,rgba(100,50,200,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 30%,rgba(60,30,140,.14) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(123,79,212,.22) 0%,transparent 40%);
  animation:nebulaDrift 12s ease-in-out infinite alternate;
}
@keyframes nebulaDrift{0%{filter:hue-rotate(0deg) brightness(1)}100%{filter:hue-rotate(12deg) brightness(1.08)}}

/* ── MAIN LAYOUT ── */
#app{
  width:100vw;height:100vh;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;z-index:2;
}

/* ── TITLE ── */
#title{
  text-align:center;z-index:5;
  margin-bottom:1.2rem;
  opacity:0;transform:translateY(-14px);
  transition:opacity 1s ease,transform 1s ease;
}
#title.on{opacity:1;transform:translateY(0);}
#t1{font-size:11px;letter-spacing:7px;color:var(--purple);font-style:italic;margin-bottom:8px;text-transform:uppercase;}
#t2{font-size:clamp(20px,3.8vw,28px);color:var(--pale);letter-spacing:3px;font-weight:300;margin-bottom:6px;text-shadow:0 0 30px rgba(168,126,224,.4);}
#t3{font-size:12px;letter-spacing:2px;color:var(--purple);font-style:italic;}

/* ── CANNON SCENE ── */
#cannon-scene{
  position:relative;z-index:5;
  margin-bottom:1.2rem;
  opacity:0;transform:scale(.9);
  transition:opacity 1s ease .3s,transform 1s ease .3s;
  display:flex;flex-direction:column;align-items:center;
}
#cannon-scene.on{opacity:1;transform:scale(1);}

/* Ground glow */
#ground-glow{
  width:240px;height:20px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,140,40,.3) 0%,rgba(123,79,212,.15) 45%,transparent 70%);
  animation:glowPulse 2s ease-in-out infinite;
  margin-top:2px;
}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scaleX(1)}50%{opacity:1;transform:scaleX(1.18)}}

/* SVG wrapper */
#cannon-wrap{
  position:relative;
  width:320px;height:200px;
  display:flex;align-items:center;justify-content:center;
}

#cannon-svg{
  width:320px;height:200px;
  overflow:visible;
  animation:cannonBob 3.2s ease-in-out infinite;
  filter:drop-shadow(0 10px 22px rgba(80,40,160,.55));
}
@keyframes cannonBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#cannon-svg.recoil{animation:cannonRecoil .5s cubic-bezier(.36,.07,.19,.97) both;}
@keyframes cannonRecoil{
  0%{transform:translate(0,0) rotate(0deg)}
  18%{transform:translate(22px,2px) rotate(2.5deg)}
  45%{transform:translate(-9px,-1px) rotate(-1deg)}
  72%{transform:translate(4px,0) rotate(.5deg)}
  100%{transform:translate(0,0) rotate(0deg)}
}

/* Muzzle flash element */
#muzzle-flash{
  position:absolute;
  /* will be positioned by JS after SVG renders */
  top:28px;left:-8px;
  width:80px;height:80px;
  opacity:0;pointer-events:none;z-index:10;
  transform-origin:right center;
}
#muzzle-flash.bang{animation:flashBang .38s ease-out forwards;}
@keyframes flashBang{
  0%{opacity:1;transform:scale(.2)}
  25%{opacity:1;transform:scale(1.15)}
  60%{opacity:.7;transform:scale(1)}
  100%{opacity:0;transform:scale(.7)}
}

/* Screen flash */
#shot-flash{
  position:fixed;inset:0;z-index:50;
  background:radial-gradient(circle at 35% 35%,rgba(255,220,120,.65) 0%,rgba(200,150,255,.3) 40%,transparent 70%);
  opacity:0;pointer-events:none;transition:opacity .07s;
}

/* Smoke puffs */
.smoke{
  position:absolute;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(210,190,170,.75) 0%,rgba(160,140,120,.3) 55%,transparent 70%);
  animation:smokeDrift ease-out forwards;
}
@keyframes smokeDrift{
  0%{opacity:.9;transform:scale(.25) translate(0,0)}
  35%{opacity:.55}
  100%{opacity:0;transform:scale(3) translate(var(--sx),var(--sy))}
}

/* Fuse */
#fuse{
  font-size:28px;cursor:pointer;
  animation:fusePulse 1.7s ease-in-out infinite;
  display:block;text-align:center;
  font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif;
  filter:drop-shadow(0 0 10px rgba(255,180,50,.7));
  z-index:5;position:relative;margin-top:-4px;
}
@keyframes fusePulse{0%,100%{transform:scale(1) rotate(-8deg)}50%{transform:scale(1.2) rotate(8deg)}}

/* ── INPUT ── */
#input-area{
  display:flex;flex-direction:column;align-items:center;
  gap:14px;z-index:5;
  opacity:0;transform:translateY(12px);
  transition:opacity 1s ease .55s,transform 1s ease .55s;
}
#input-area.on{opacity:1;transform:translateY(0);}

#wish-input{
  width:clamp(260px,58vw,400px);
  background:rgba(255,255,255,.03);
  border:1px solid rgba(123,79,212,.5);
  border-radius:8px;color:var(--lilac);
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(15px,2.4vw,18px);font-style:italic;
  padding:13px 20px;letter-spacing:1px;outline:none;text-align:center;
  transition:border-color .3s,box-shadow .3s,background .3s;
}
#wish-input::placeholder{color:rgba(123,79,212,.5);}
#wish-input:focus{
  border-color:var(--violet);
  background:rgba(123,79,212,.05);
  box-shadow:0 0 22px rgba(168,126,224,.18),inset 0 0 10px rgba(123,79,212,.04);
}

#fire-btn{
  background:linear-gradient(135deg,#9868d8,#5e3eaa,#7e58c0);
  background-size:200% 200%;
  color:#fff;border:none;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(14px,2.4vw,16px);
  padding:13px 48px;border-radius:50px;cursor:pointer;
  letter-spacing:3px;font-style:italic;
  box-shadow:0 0 26px rgba(123,79,212,.5),0 4px 18px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
  animation:btnFloat 2.6s ease-in-out infinite;
  transition:transform .2s,box-shadow .2s;
}
#fire-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);
  background-size:200% 100%;animation:sheen 3s linear infinite;border-radius:50px;
}
@keyframes sheen{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes btnFloat{
  0%,100%{transform:translateY(0);box-shadow:0 0 26px rgba(123,79,212,.5),0 4px 18px rgba(0,0,0,.3)}
  50%{transform:translateY(-4px);box-shadow:0 0 38px rgba(123,79,212,.75),0 8px 28px rgba(0,0,0,.4)}
}
#fire-btn:hover{transform:scale(1.05) translateY(-2px)!important;box-shadow:0 0 48px rgba(168,126,224,.8)!important;}
#fire-btn:disabled{opacity:.45;cursor:not-allowed;animation:none;}

/* ── RECEIVED SCREEN ── */
#recv{
  position:fixed;inset:0;z-index:40;
  background:linear-gradient(155deg,#060214 0%,#0c0520 40%,#03030d 100%);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:2rem 1.5rem;
  opacity:0;transition:opacity .9s ease;
  overflow-y:auto;
}
#recv.show{display:flex;}
#recv.visible{opacity:1;}

.rv-fade{opacity:0;transform:translateY(12px);transition:opacity .8s ease,transform .8s ease;}
.rv-fade.on{opacity:1;transform:translateY(0);}

#rv-stars{font-size:12px;letter-spacing:14px;color:var(--purple);margin-bottom:1.2rem;}
#rv-icon{font-size:52px;margin-bottom:1rem;font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif;animation:iconFloat 3s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.07) translateY(-6px)}}
#rv-title{font-size:clamp(26px,5vw,36px);color:var(--pale);letter-spacing:4px;font-weight:300;margin-bottom:.3rem;text-shadow:0 0 40px rgba(168,126,224,.5);}
#rv-subtitle{font-size:12px;letter-spacing:4px;color:var(--purple);font-style:italic;margin-bottom:1.6rem;}

#rv-divider{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:1.6rem;}
.rdl{width:55px;height:.5px;background:linear-gradient(90deg,transparent,var(--purple));}
.rdl.r{background:linear-gradient(90deg,var(--purple),transparent);}
.rdd{width:5px;height:5px;background:var(--violet);transform:rotate(45deg);}

#rv-wish-wrap{
  max-width:480px;margin-bottom:.8rem;
  position:relative;padding:0 2rem;
}
#rv-wish-wrap::before{content:'\201C';position:absolute;top:-16px;left:2px;font-size:72px;line-height:1;color:rgba(123,79,212,.2);font-family:Georgia,serif;}
#rv-wish-wrap::after{content:'\201D';position:absolute;bottom:-36px;right:2px;font-size:72px;line-height:1;color:rgba(123,79,212,.2);font-family:Georgia,serif;}
#rv-wish{font-size:clamp(17px,3.2vw,22px);color:var(--lilac);font-style:italic;letter-spacing:1px;line-height:1.9;}

#rv-msg{
  font-size:clamp(12px,2vw,14.5px);
  color:rgba(212,184,240,.72);font-style:italic;
  letter-spacing:.6px;line-height:2;
  max-width:440px;text-align:center;
  margin-top:1.4rem;margin-bottom:.4rem;
  text-shadow:0 0 18px rgba(168,126,224,.2);
}
#rv-sub{font-size:clamp(11px,1.8vw,12.5px);color:rgba(123,79,212,.65);letter-spacing:2px;font-style:italic;line-height:2;margin-top:.9rem;margin-bottom:2rem;}

#rv-btn{
  background:transparent;border:1px solid rgba(123,79,212,.6);
  color:var(--lilac);font-family:'Cormorant Garamond',serif;
  font-size:clamp(13px,2vw,15px);padding:13px 42px;border-radius:40px;
  cursor:pointer;letter-spacing:3px;font-style:italic;
  animation:btnFloat 2.8s ease-in-out infinite;
  transition:background .4s,border-color .4s,box-shadow .4s,transform .3s;
}
#rv-btn:hover{background:rgba(123,79,212,.15);border-color:var(--violet);box-shadow:0 0 22px rgba(168,126,224,.3);transform:translateY(-2px);}

/* mobile */
@media(max-width:480px){
  #cannon-wrap{width:260px;height:165px;}
  #cannon-svg{width:260px;height:165px;}
  #muzzle-flash{top:22px;left:-4px;}
  #rv-wish-wrap{padding:0 .5rem;}
  #rv-wish-wrap::before,#rv-wish-wrap::after{display:none;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="fw-canvas"></canvas>
<div id="nebula"></div>
<div id="shot-flash"></div>

<div id="app">

  <!-- TITLE -->
  <div id="title">
    <div id="t1">the wish cannon</div>
    <div id="t2">make a birthday wish, Akshu</div>
    <div id="t3">type it &nbsp;✦&nbsp; make it real &nbsp;✦&nbsp; fire it into the stars</div>
  </div>

  <!-- CANNON -->
  <div id="cannon-scene">
    <div id="cannon-wrap">
      <!-- Muzzle flash overlay -->
      <div id="muzzle-flash">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(68,40)">
            <polygon points="0,-28 3,-7 0,-3 -3,-7" fill="#fff9c4" opacity=".95"/>
            <polygon points="0,-28 3,-7 0,-3 -3,-7" fill="#fff9c4" opacity=".9"  transform="rotate(40)"/>
            <polygon points="0,-26 3,-7 0,-3 -3,-7" fill="#ffe082" opacity=".85" transform="rotate(80)"/>
            <polygon points="0,-24 3,-7 0,-3 -3,-7" fill="#fff9c4" opacity=".9"  transform="rotate(120)"/>
            <polygon points="0,-22 3,-7 0,-3 -3,-7" fill="#ffe082" opacity=".8"  transform="rotate(160)"/>
            <polygon points="0,-20 2,-6 0,-2 -2,-6" fill="#fff9c4" opacity=".7"  transform="rotate(200)"/>
            <polygon points="0,-18 2,-5 0,-2 -2,-5" fill="#ffe082" opacity=".6"  transform="rotate(240)"/>
            <circle r="13" fill="#fff176" opacity=".95"/>
            <circle r="9"  fill="#fff9c4"/>
            <circle r="5"  fill="#ffffff"/>
          </g>
        </svg>
      </div>

      <!-- CARTOON CANNON SVG -->
      <svg id="cannon-svg" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <defs>
          <!-- Wood warm brown -->
          <linearGradient id="wdSide" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#e8903e"/>
            <stop offset="40%"  stop-color="#c06e22"/>
            <stop offset="100%" stop-color="#8a4810"/>
          </linearGradient>
          <linearGradient id="wdTop" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#f0a050"/>
            <stop offset="100%" stop-color="#c47030"/>
          </linearGradient>
          <!-- Iron dark purple/metal -->
          <linearGradient id="ironSide" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#180c30"/>
            <stop offset="18%"  stop-color="#5a3898"/>
            <stop offset="42%"  stop-color="#9878cc"/>
            <stop offset="62%"  stop-color="#7050a8"/>
            <stop offset="82%"  stop-color="#3a2070"/>
            <stop offset="100%" stop-color="#110828"/>
          </linearGradient>
          <linearGradient id="ironTop" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#c8a8e8"/>
            <stop offset="50%"  stop-color="#7050a8"/>
            <stop offset="100%" stop-color="#2a1858"/>
          </linearGradient>
          <linearGradient id="ironEnd" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#9878cc"/>
            <stop offset="45%"  stop-color="#b898e8"/>
            <stop offset="100%" stop-color="#4a3080"/>
          </linearGradient>
          <!-- Wheel wood -->
          <radialGradient id="wheelFill" cx="38%" cy="32%" r="60%">
            <stop offset="0%"   stop-color="#e8903e"/>
            <stop offset="55%"  stop-color="#a85f20"/>
            <stop offset="100%" stop-color="#6a3810"/>
          </radialGradient>
          <!-- Cannonball -->
          <radialGradient id="ballFill" cx="34%" cy="28%" r="60%">
            <stop offset="0%"   stop-color="#b898e8"/>
            <stop offset="55%"  stop-color="#4a3080"/>
            <stop offset="100%" stop-color="#140828"/>
          </radialGradient>
          <!-- Bore hole -->
          <radialGradient id="boreFill" cx="40%" cy="35%" r="65%">
            <stop offset="0%"  stop-color="#2a1060"/>
            <stop offset="100%" stop-color="#06020e"/>
          </radialGradient>
          <filter id="dropshadow" x="-15%" y="-15%" width="130%" height="130%">
            <feDropShadow dx="1" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,.65)"/>
          </filter>
          <filter id="metalshine">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <feOffset dy="-1" result="offset"/>
            <feMerge><feMergeNode in="offset"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- ══ GROUND SHADOW ══ -->
        <ellipse cx="162" cy="185" rx="95" ry="9" fill="rgba(0,0,0,.38)"/>

        <!-- ══ CARRIAGE (wooden frame) ══ -->
        <g filter="url(#dropshadow)">
          <!-- Main horizontal beam -->
          <rect x="70" y="122" width="165" height="24" rx="5" fill="url(#wdSide)"/>
          <!-- Top face of beam -->
          <rect x="70" y="122" width="165" height="7" rx="4" fill="url(#wdTop)"/>
          <!-- Wood grain detail -->
          <line x1="98"  y1="123" x2="96"  y2="145" stroke="rgba(80,35,5,.18)" stroke-width="1.2"/>
          <line x1="128" y1="123" x2="126" y2="145" stroke="rgba(80,35,5,.18)" stroke-width="1.2"/>
          <line x1="162" y1="123" x2="160" y2="145" stroke="rgba(80,35,5,.18)" stroke-width="1.2"/>
          <line x1="198" y1="123" x2="196" y2="145" stroke="rgba(80,35,5,.18)" stroke-width="1.2"/>
          <!-- Iron bands on beam -->
          <rect x="88"  y="122" width="8" height="24" rx="1.5" fill="#2a1858" opacity=".85"/>
          <rect x="148" y="122" width="8" height="24" rx="1.5" fill="#2a1858" opacity=".85"/>
          <rect x="210" y="122" width="8" height="24" rx="1.5" fill="#2a1858" opacity=".85"/>
          <!-- Band highlights -->
          <rect x="89"  y="122" width="2" height="24" rx="1" fill="rgba(168,126,224,.3)"/>
          <rect x="149" y="122" width="2" height="24" rx="1" fill="rgba(168,126,224,.3)"/>
          <rect x="211" y="122" width="2" height="24" rx="1" fill="rgba(168,126,224,.3)"/>
        </g>

        <!-- ══ LEFT WHEEL (big, perspective front) ══ -->
        <g transform="translate(98,148)" filter="url(#dropshadow)">
          <!-- Outer iron tyre -->
          <circle r="42" fill="#160a30" stroke="#3a2068" stroke-width="6"/>
          <circle r="42" fill="none"    stroke="#7050a8" stroke-width="3.5"/>
          <circle r="42" fill="none"    stroke="rgba(168,126,224,.25)" stroke-width="1.5"/>
          <!-- Wood rim face -->
          <circle r="37" fill="url(#wheelFill)"/>
          <!-- Rim top edge -->
          <circle r="37" fill="none" stroke="rgba(240,160,80,.2)" stroke-width="2.5"/>
          <!-- 8 spokes -->
          <g stroke="#7a4012" stroke-width="4.5" stroke-linecap="round" opacity=".95">
            <line x1="0" y1="0" x2="0"   y2="-33"/>
            <line x1="0" y1="0" x2="23"  y2="-23"/>
            <line x1="0" y1="0" x2="33"  y2="0"/>
            <line x1="0" y1="0" x2="23"  y2="23"/>
            <line x1="0" y1="0" x2="0"   y2="33"/>
            <line x1="0" y1="0" x2="-23" y2="23"/>
            <line x1="0" y1="0" x2="-33" y2="0"/>
            <line x1="0" y1="0" x2="-23" y2="-23"/>
          </g>
          <!-- Spoke highlights -->
          <g stroke="rgba(230,165,80,.2)" stroke-width="1.8" stroke-linecap="round">
            <line x1="0" y1="0" x2="0"   y2="-33"/>
            <line x1="0" y1="0" x2="23"  y2="-23"/>
            <line x1="0" y1="0" x2="33"  y2="0"/>
            <line x1="0" y1="0" x2="23"  y2="23"/>
            <line x1="0" y1="0" x2="0"   y2="33"/>
            <line x1="0" y1="0" x2="-23" y2="23"/>
            <line x1="0" y1="0" x2="-33" y2="0"/>
            <line x1="0" y1="0" x2="-23" y2="-23"/>
          </g>
          <!-- Hub -->
          <circle r="12" fill="#4a2878" stroke="#9878cc" stroke-width="2.5"/>
          <circle r="7"  fill="#7858b8" stroke="rgba(200,160,255,.45)" stroke-width="1.5"/>
          <circle r="3.5" fill="#a888d8"/>
        </g>

        <!-- ══ RIGHT WHEEL (smaller, perspective back) ══ -->
        <g transform="translate(218,145)" filter="url(#dropshadow)">
          <circle r="33" fill="#160a30" stroke="#3a2068" stroke-width="5"/>
          <circle r="33" fill="none"    stroke="#7050a8" stroke-width="3"/>
          <circle r="33" fill="none"    stroke="rgba(168,126,224,.2)" stroke-width="1"/>
          <circle r="28" fill="url(#wheelFill)" opacity=".88"/>
          <circle r="28" fill="none"    stroke="rgba(240,160,80,.15)" stroke-width="2"/>
          <g stroke="#7a4012" stroke-width="3.5" stroke-linecap="round" opacity=".9">
            <line x1="0" y1="0" x2="0"   y2="-25"/>
            <line x1="0" y1="0" x2="18"  y2="-18"/>
            <line x1="0" y1="0" x2="25"  y2="0"/>
            <line x1="0" y1="0" x2="18"  y2="18"/>
            <line x1="0" y1="0" x2="0"   y2="25"/>
            <line x1="0" y1="0" x2="-18" y2="18"/>
            <line x1="0" y1="0" x2="-25" y2="0"/>
            <line x1="0" y1="0" x2="-18" y2="-18"/>
          </g>
          <circle r="9"  fill="#4a2878" stroke="#9878cc" stroke-width="2"/>
          <circle r="5"  fill="#7858b8"/>
          <circle r="2.5" fill="#a888d8"/>
        </g>

        <!-- ══ BARREL (pointing upper-left at ~22°) ══ -->
        <!--
          Strategy: draw the barrel as a horizontal cylinder, then rotate the whole group.
          Centre pivot at (170, 130) — on top of the carriage.
          Barrel length ~155px, radius ~22px.
          After rotate(-22deg) the tip points upper-left.
        -->
        <g id="barrel-group" transform="rotate(-22, 170, 118)" filter="url(#dropshadow)">

          <!-- Barrel tube (horizontal) — left=muzzle end, right=breech -->
          <!-- Bottom face (dark underside) -->
          <rect x="52" y="118" width="236" height="44" rx="8" fill="#180c30"/>
          <!-- Main barrel face -->
          <rect x="52" y="108" width="236" height="44" rx="8" fill="url(#ironSide)"/>
          <!-- Top highlight -->

<script>
const W=()=>window.innerWidth, H=()=>window.innerHeight;
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══════════════════════════════════════════
   STARFIELD
══════════════════════════════════════════ */
const bgC=document.getElementById('bg-canvas');
const bgX=bgC.getContext('2d');
let stars=[];
function initStars(){
  bgC.width=window.innerWidth; bgC.height=window.innerHeight;
  stars=[];
  for(let i=0;i<300;i++) stars.push({
    x:Math.random()*bgC.width, y:Math.random()*bgC.height,
    r:.2+Math.random()*1.5,
    speed:.2+Math.random()*1.1,
    phase:Math.random()*Math.PI*2,
    hue:Math.random()<.15?(Math.random()<.5?270:30):0,
    sat:Math.random()<.15?60:0,
  });
}
initStars();
window.addEventListener('resize',initStars);
let st=0;
(function drawStars(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  st+=.012;
  stars.forEach(s=>{
    const a=.07+.78*(.5+.5*Math.sin(st*s.speed+s.phase));
    bgX.beginPath();
    bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=s.sat>0?`hsla(${s.hue},${s.sat}%,85%,${a})`:`rgba(255,255,255,${a})`;
    bgX.fill();
  });
  requestAnimationFrame(drawStars);
})();

/* ══════════════════════════════════════════
   FIREWORKS CANVAS
══════════════════════════════════════════ */
const fwC=document.getElementById('fw-canvas');
const fwX=fwC.getContext('2d');
let particles=[];
let fwActive=false;
function resizeFW(){fwC.width=window.innerWidth;fwC.height=window.innerHeight;}
resizeFW(); window.addEventListener('resize',resizeFW);

function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function spawnShell(x,y,color){
  const count=55+Math.floor(Math.random()*35);
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*2, speed=2.2+Math.random()*4.8;
    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      alpha:1,decay:.012+Math.random()*.013,radius:1.4+Math.random()*2.6,
      color,tail:[],gravity:.055+Math.random()*.04,shimmer:Math.random()>.5});
  }
  particles.push({x,y,vx:0,vy:0,alpha:1,decay:.09,radius:16+Math.random()*10,
    color:'#ffffff',tail:[],gravity:0,shimmer:false,flash:true});
}
function spawnTrail(x,y,color){
  for(let i=0;i<10;i++) particles.push({
    x,y,vx:(Math.random()-.5)*1.4,vy:-1.8-Math.random()*2.8,
    alpha:.7,decay:.028,radius:1+Math.random()*1.4,
    color,tail:[],gravity:.07,shimmer:false});
}

let fwRunning=false;
function fwLoop(){
  if(fwRunning) return; fwRunning=true;
  (function loop(){
    if(!fwActive&&particles.length===0){fwRunning=false;return;}
    fwX.clearRect(0,0,fwC.width,fwC.height);
    particles=particles.filter(p=>p.alpha>.012);
    particles.forEach(p=>{
      p.tail.push({x:p.x,y:p.y,a:p.alpha});
      if(p.tail.length>6) p.tail.shift();
      p.tail.forEach((tp,i)=>{
        try{
          fwX.beginPath();
          fwX.arc(tp.x,tp.y,p.radius*(i/p.tail.length)*.65,0,Math.PI*2);
          fwX.fillStyle=hexRgba(p.color,tp.a*.22);
          fwX.fill();
        }catch(e){}
      });
      fwX.beginPath();
      fwX.arc(p.x,p.y,p.radius,0,Math.PI*2);
      try{fwX.fillStyle=hexRgba(p.color,p.flash?p.alpha*.55:p.alpha);}catch(e){fwX.fillStyle=`rgba(255,255,255,${p.alpha})`;}
      fwX.fill();
      if(p.shimmer&&Math.random()>.72){
        fwX.beginPath();fwX.arc(p.x,p.y,p.radius*1.9,0,Math.PI*2);
        try{fwX.fillStyle=hexRgba(p.color,p.alpha*.12);}catch(e){}
        fwX.fill();
      }
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=.982; p.alpha-=p.decay;
    });
    requestAnimationFrame(loop);
  })();
}

/* ══════════════════════════════════════════
   SOUNDS
══════════════════════════════════════════ */
let sCtx=null;
function getCtx(){if(!sCtx)sCtx=new(window.AudioContext||window.webkitAudioContext)();return sCtx;}

function playFizzle(){
  const ctx=getCtx();
  const buf=ctx.createBuffer(1,ctx.sampleRate*.35,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.4);
  const src=ctx.createBufferSource(); src.buffer=buf;
  const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=3200; f.Q.value=.6;
  const g=ctx.createGain(); g.gain.value=.28;
  src.connect(f);f.connect(g);g.connect(ctx.destination); src.start();
}

function playBoom(){
  const ctx=getCtx();
  // Deep low thud
  const buf=ctx.createBuffer(1,ctx.sampleRate*.7,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.08))*.95;
  const src=ctx.createBufferSource(); src.buffer=buf;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=200;
  const g=ctx.createGain();
  g.gain.setValueAtTime(1.3,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.65);
  src.connect(lp);lp.connect(g);g.connect(ctx.destination);src.start();
  // Crack overtone
  const o=ctx.createOscillator(),og=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(260,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(35,ctx.currentTime+.22);
  og.gain.setValueAtTime(.38,ctx.currentTime);
  og.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);
  o.connect(og);og.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.22);
}

function playWhoosh(){
  const ctx=getCtx();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(700,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+.45);
  g.gain.setValueAtTime(.16,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.45);
}

function playFWPop(){
  const ctx=getCtx();
  const buf=ctx.createBuffer(1,ctx.sampleRate*.2,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.045))*.7;
  const src=ctx.createBufferSource();src.buffer=buf;
  const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=900+Math.random()*500;
  const g=ctx.createGain();g.gain.setValueAtTime(.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
  src.connect(f);f.connect(g);g.connect(ctx.destination);src.start();
}

function playChime(){
  const ctx=getCtx();
  [523.3,659.3,784,1046.5,1318.5].forEach((freq,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    const rev=ctx.createConvolver();
    const rLen=ctx.sampleRate*1.4; const rBuf=ctx.createBuffer(1,rLen,ctx.sampleRate);
    const rd=rBuf.getChannelData(0);
    for(let j=0;j<rLen;j++) rd[j]=(Math.random()*2-1)*Math.pow(1-j/rLen,2.8);
    rev.buffer=rBuf;
    const rg=ctx.createGain();rg.gain.value=.3;rev.connect(rg);rg.connect(ctx.destination);
    const t=ctx.currentTime+i*.12;
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.85);
    o.connect(g);g.connect(ctx.destination);g.connect(rev);o.start(t);o.stop(t+1);
  });
}

let ambPlaying=false;
function playAmbient(){
  if(ambPlaying)return; ambPlaying=true;
  const ctx=getCtx();
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(.11,ctx.currentTime+3);
  master.connect(ctx.destination);
  const rev=ctx.createConvolver();
  const rLen=ctx.sampleRate*4; const rBuf=ctx.createBuffer(2,rLen,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=rBuf.getChannelData(c);for(let i=0;i<rLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/rLen,1.7);}
  rev.buffer=rBuf;const rvg=ctx.createGain();rvg.gain.value=.5;rev.connect(rvg);rvg.connect(master);
  function pad(freq,t,dur,vol=.038){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+1.1);
    g.gain.linearRampToValueAtTime(vol*.8,t+dur-1.1);g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(master);g.connect(rev);o.start(t);o.stop(t+dur);
  }
  const chords=[[220,261.6,329.6,392,523.3],[246.9,293.7,369.99,440,587.3],[261.6,329.6,392,493.9,659.3],[220,293.7,349.2,440,523.3]];
  function schedChords(t){
    chords.forEach((ch,ci)=>ch.forEach(f=>pad(f,t+ci*4.5,5.5)));
    setTimeout(()=>{if(ambPlaying)schedChords(ctx.currentTime);},chords.length*4.5*1000-400);
  }
  schedChords(ctx.currentTime+.5);
  const mel=[[659.3,.58],[523.3,.58],[587.3,.58],[440,.96],[523.3,.58],[493.9,.58],[440,.58],[392,1.15],[587.3,.58],[523.3,.58],[493.9,.58],[440,.96],[392,.58],[440,.58],[493.9,.58],[523.3,1.75]];
  const melDur=mel.reduce((s,[,d])=>s+d*.9,0);
  function playMel(t0){
    let t=t0;
    mel.forEach(([freq,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.052,t+.035);g.gain.exponentialRampToValueAtTime(.001,t+dur*.9);
      o.connect(g);g.connect(master);g.connect(rev);o.start(t);o.stop(t+dur);
      t+=dur*.9;
    });
    setTimeout(()=>{if(ambPlaying)playMel(ctx.currentTime+.2);},(melDur+.6)*1000);
  }
  playMel(ctx.currentTime+1.8);
}

/* ══════════════════════════════════════════
   SMOKE PUFFS
══════════════════════════════════════════ */
function spawnSmoke(){
  const scene=document.getElementById('cannon-scene');

/* ══════════════════════════════════════════
   WISH MESSAGE
══════════════════════════════════════════ */
function wishMsg(wish){
  const w=wish.toLowerCase();
  if(/health|healthy|fit|fitness/.test(w))  return "your body carries you through every adventure — may it feel strong, light, and full of energy every single day.";
  if(/love|relationship|him|her|someone special/.test(w)) return "the love you wish for is already on its way — the universe has a soft spot for people who feel as deeply as you do.";
  if(/happy|happiness|joy|joyful/.test(w))  return "you deserve a happiness that isn't earned or explained — just felt, completely, without reason. may it find you in quiet moments too.";
  if(/success|career|job|work|achieve|achieve/.test(w)) return "every door you've earned is already opening. the version of you that achieves this? she's been in the room all along.";
  if(/travel|trip|explore|world|abroad|places/.test(w)) return "may every new place feel like it was made for you — and may the best journey always be the one still ahead.";
  if(/peace|calm|rest|relax|anxiety/.test(w)) return "may your mind find the quiet it deserves — soft mornings, undisturbed rest, and a heart that finally feels at ease.";
  if(/money|rich|wealth|financial|abundance/.test(w)) return "may abundance come to you freely — because someone who gives as much as you do deserves to receive without limit.";
  if(/family|mom|dad|parents|home/.test(w)) return "the love between you and your family is one of the most beautiful things about you. may it grow softer and sweeter with every year.";
  if(/friend|friends|friendship/.test(w)) return "real ones are rare — and you've always known how to be one. may your circle stay true, warm, and laughing with you always.";
  if(/confidence|courage|brave|strong|believe/.test(w)) return "you are already more of what you're asking for than you realise. may this year show you that, slowly and undeniably.";
  if(/dream|goal|become|future|someday/.test(w)) return "the dream you just wrote down is not too big — it's exactly the right size for who you're becoming. keep going.";
  const defaults=[
    "whatever this wish carries inside it — the longing, the hope, the quiet urgency — the universe felt all of it. consider it heard.",
    "you wished with your whole heart. that matters more than you know. may everything this wish holds find its way back to you.",
    "some wishes take a moment. some take a year. but the ones made on your birthday, with this much feeling? those ones always land.",
    "the stars don't forget a single word. your wish is written in this sky now — patient, certain, and already on its way.",
  ];
  return defaults[Math.floor(Math.random()*defaults.length)];
}

/* ══════════════════════════════════════════
   CANNON FIRE
══════════════════════════════════════════ */
async function launchFireworks(){
  const cols=['#f9a8d4','#fcd34d','#c4b5fd','#86efac','#93c5fd','#fb923c','#f472b6','#e8d8ff','#ffeaa7','#a78bfa','#ff6b9d','#ffd700','#40e0d0','#ff9ec0'];

  // Fuse sizzle
  playFizzle();
  await sleep(220);

  // SVG recoil
  const svg=document.getElementById('cannon-svg');
  svg.classList.remove('recoil');
  void svg.offsetWidth;
  svg.classList.add('recoil');

  // Boom + whoosh
  playBoom(); playWhoosh();

  // Muzzle flash
  const mf=document.getElementById('muzzle-flash');
  mf.classList.remove('bang'); void mf.offsetWidth; mf.classList.add('bang');

  // Screen flash
  const sf=document.getElementById('shot-flash');
  sf.style.opacity='1'; await sleep(75); sf.style.opacity='0';

  // Smoke
  spawnSmoke();

  // Fireworks
  fwActive=true; fwLoop();
  const cw=fwC.width, ch=fwC.height;
  const pts=[
    [cw*.5,ch*.2],[cw*.25,ch*.17],[cw*.75,ch*.15],
    [cw*.1,ch*.28],[cw*.9,ch*.24],[cw*.5,ch*.08],
    [cw*.38,ch*.34],[cw*.62,ch*.30],[cw*.18,ch*.42],
    [cw*.82,ch*.38],[cw*.5,ch*.26],[cw*.3,ch*.11],[cw*.7,ch*.13],
  ];
  for(let i=0;i<pts.length;i++){
    await sleep(i===0?0:145);
    const col=cols[Math.floor(Math.random()*cols.length)];
    spawnShell(pts[i][0],pts[i][1],col);
    spawnTrail(cw*.42,ch*.45,col);
    playFWPop();
    if(i%3===0){
      await sleep(55);
      spawnShell(pts[i][0]+(Math.random()-.5)*130,pts[i][1]+(Math.random()-.5)*90,cols[Math.floor(Math.random()*cols.length)]);
      playFWPop();
    }
  }
  await sleep(1800);
  fwActive=false;
}

/* ══════════════════════════════════════════
   FIRE WISH
══════════════════════════════════════════ */
async function fireWish(){
  const input=document.getElementById('wish-input');
  const wish=input.value.trim();
  if(!wish){
    input.style.borderColor='#c84060';
    input.style.boxShadow='0 0 16px rgba(200,64,96,.3)';
    input.placeholder='please write a wish first, Akshu! ✨';
    setTimeout(()=>{input.style.borderColor='rgba(123,79,212,.5)';input.style.boxShadow='';input.placeholder='write your wish here...';},1700);
    return;
  }
  document.getElementById('fire-btn').disabled=true;
  await launchFireworks();
  await sleep(700);
  showReceived(wish);
}

/* ══════════════════════════════════════════
   SHOW RECEIVED
══════════════════════════════════════════ */
function showReceived(wish){
  document.getElementById('rv-wish').textContent=wish;
  document.getElementById('rv-msg').textContent=wishMsg(wish);
  const recv=document.getElementById('recv');
  recv.classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    recv.classList.add('visible');
    playChime();
    setTimeout(()=>playAmbient(),900);
    const items=recv.querySelectorAll('.rv-fade');
    items.forEach((el,i)=>{
      el.style.transition=`opacity .8s ease ${.15+i*.18}s, transform .8s ease ${.15+i*.18}s`;
      setTimeout(()=>el.classList.add('on'),100+i*180);
    });
    // Extra fireworks on received
    setTimeout(()=>{
      fwActive=true; fwLoop();
      const cols=['#f9a8d4','#c4b5fd','#fcd34d','#86efac','#a78bfa','#ffeaa7'];
      for(let i=0;i<6;i++) setTimeout(()=>spawnShell(W()*(.1+Math.random()*.8),H()*(.05+Math.random()*.45),cols[Math.floor(Math.random()*cols.length)]),i*380);
    },500);
  }));
}
