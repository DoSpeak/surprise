<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Wish Cannon — Akshu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040e;min-height:100vh;overflow:hidden;font-family:"Cormorant Garamond",serif}
#app{width:100vw;height:100vh;background:radial-gradient(ellipse at 50% 85%,#160a28 0%,#04040e 55%);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw ease-in-out infinite;pointer-events:none}
@keyframes tw{0%,100%{opacity:0.08}50%{opacity:0.85}}
#title{text-align:center;margin-bottom:2rem;z-index:5;opacity:0;transition:opacity 1s ease}
#title.on{opacity:1}
#t1{font-size:12px;letter-spacing:6px;color:#9878c8;font-style:italic;margin-bottom:8px}
#t2{font-size:26px;color:#e8d8ff;letter-spacing:3px;font-weight:300;margin-bottom:6px}
#t3{font-size:12px;letter-spacing:2px;color:#6848a8;font-style:italic}
/* CANNON */
#cannon-scene{position:relative;z-index:5;margin-bottom:1.5rem;opacity:0;transition:opacity 1s ease 0.3s;display:flex;flex-direction:column;align-items:center}
#cannon-scene.on{opacity:1}
#cannon-platform{width:160px;height:20px;background:linear-gradient(180deg,#3a2858,#2a1840);border-radius:4px;border:1px solid #6848a8;box-shadow:0 4px 16px rgba(100,72,168,0.3)}
#cannon-body{width:100px;height:52px;background:linear-gradient(135deg,#5a3880,#3a2060);border-radius:8px 8px 6px 6px;border:1px solid #9878c8;box-shadow:0 0 20px rgba(152,120,200,0.3);position:relative;margin:0 auto;margin-top:-8px}
#cannon-barrel{width:28px;height:90px;background:linear-gradient(180deg,#7858b8,#4a3080);border-radius:14px 14px 4px 4px;position:absolute;top:-80px;left:50%;transform:translateX(-50%) rotate(-18deg);transform-origin:bottom center;border:1px solid #a888d8;box-shadow:0 0 14px rgba(152,120,200,0.4);transition:transform 0.4s ease}
#cannon-mouth{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#2a1840,#0a0418);border:2px solid #7858b8;position:absolute;top:-94px;left:50%;transform:translateX(-50%) translateX(-4px) rotate(-18deg);transform-origin:0 0;animation:mouthpulse 2s ease-in-out infinite;box-shadow:inset 0 0 10px rgba(200,168,232,0.3),0 0 16px rgba(120,88,184,0.4)}
@keyframes mouthpulse{0%,100%{box-shadow:inset 0 0 10px rgba(200,168,232,0.3),0 0 16px rgba(120,88,184,0.4)}50%{box-shadow:inset 0 0 18px rgba(200,168,232,0.6),0 0 28px rgba(120,88,184,0.7)}}
#fuse{font-size:28px;cursor:pointer;animation:fusepulse 1.8s ease-in-out infinite;display:block;text-align:center;margin-top:10px;font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif;filter:drop-shadow(0 0 8px rgba(255,180,50,0.6))}
@keyframes fusepulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.18) rotate(5deg)}}
/* INPUT */
#input-area{display:flex;flex-direction:column;align-items:center;gap:14px;z-index:5;opacity:0;transition:opacity 1s ease 0.5s}
#input-area.on{opacity:1}
#wish-input{width:380px;max-width:88vw;background:rgba(255,255,255,0.03);border:1px solid #5a3888;border-radius:6px;color:#e8d8ff;font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;padding:14px 20px;letter-spacing:1px;outline:none;text-align:center;transition:border-color 0.3s,box-shadow 0.3s}
#wish-input::placeholder{color:#4a2878}
#wish-input:focus{border-color:#c8a8e8;box-shadow:0 0 16px rgba(200,168,232,0.15)}
#fire-btn{background:linear-gradient(135deg,#9878c8,#6848a8);color:#fff;border:none;font-family:"Cormorant Garamond",serif;font-size:16px;padding:13px 44px;border-radius:40px;cursor:pointer;letter-spacing:3px;font-style:italic;box-shadow:0 0 24px rgba(152,120,200,0.45);transition:transform 0.2s,box-shadow 0.2s}
#fire-btn:hover{transform:scale(1.04);box-shadow:0 0 36px rgba(152,120,200,0.65)}
/* FIREWORKS */
.fw{position:absolute;border-radius:50%;pointer-events:none;animation:fwburst ease-out forwards}
@keyframes fwburst{0%{opacity:1}100%{opacity:0;transform:var(--to) scale(0)}}
/* RECEIVED */
#recv{position:fixed;inset:0;z-index:30;background:rgba(4,4,14,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
#recv.show{display:flex}
#rv-icon{font-size:60px;margin-bottom:1.2rem;animation:bouncein 0.6s ease;font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",serif}
@keyframes bouncein{0%{transform:scale(0)}60%{transform:scale(1.22)}100%{transform:scale(1)}}
#rv-title{font-size:34px;color:#e8d8ff;letter-spacing:3px;margin-bottom:0.8rem;font-weight:300}
#rv-wish{font-size:21px;color:#c8a8e8;font-style:italic;letter-spacing:1px;max-width:460px;line-height:1.8;margin-bottom:0.6rem}
#rv-sub{font-size:14px;color:#7858a8;letter-spacing:2px;font-style:italic;margin-bottom:2rem;line-height:1.8}
#rv-div{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:2rem}
.rdl{width:50px;height:0.5px;background:#4a2878}
.rds{width:4px;height:4px;background:#9878c8;transform:rotate(45deg)}
#rv-btn{background:transparent;border:1px solid #7858a8;color:#c8a8e8;font-family:"Cormorant Garamond",serif;font-size:14px;padding:13px 38px;border-radius:30px;cursor:pointer;letter-spacing:2px;font-style:italic;transition:background 0.3s}
#rv-btn:hover{background:rgba(200,168,232,0.1)}
</style>
</head>
<body>
<div id="app">
  <div id="title">
    <div id="t1">the wish cannon</div>
    <div id="t2">make a birthday wish, Akshu</div>
    <div id="t3">type it &#10022; make it real &#10022; fire it into the stars</div>
  </div>
  <div id="cannon-scene">
    <div style="position:relative;height:120px;width:200px">
      <div id="cannon-barrel"></div>
      <div id="cannon-mouth"></div>
      <div id="cannon-body"></div>
    </div>
    <div id="cannon-platform"></div>
    <div id="fuse">&#128293;</div>
  </div>
  <div id="input-area">
    <input id="wish-input" type="text" placeholder="write your wish here..." maxlength="120"/>
    <button id="fire-btn" onclick="fireWish()">&#10024; &nbsp; fire the cannon &nbsp; &#10024;</button>
  </div>
  <div id="recv">
    <div id="rv-icon">&#127775;</div>
    <div id="rv-title">wish received</div>
    <div id="rv-wish"></div>
    <div id="rv-sub">the universe has it now.<br>consider it done, Akshu.</div>
    <div id="rv-div"><div class="rdl"></div><div class="rds"></div><div class="rdl"></div></div>
    <button id="rv-btn" onclick="nextPage()">continue the journey &rarr;</button>
  </div>
</div>
<script>
const W=window.innerWidth,H=window.innerHeight;
const app=document.getElementById('app');
for(let i=0;i<200;i++){
  const s=document.createElement('div');s.className='star';
  const sz=0.5+Math.random()*2.2;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*H}px;left:${Math.random()*W}px;animation-duration:${1.8+Math.random()*5}s;animation-delay:${Math.random()*7}s`;
  app.appendChild(s);
}
function spawnBurst(cx,cy,color){
  for(let i=0;i<32;i++){
    const p=document.createElement('div');p.className='fw';
    const a=(i/32)*360,d=70+Math.random()*110;
    const tx=d*Math.cos(a*Math.PI/180),ty=d*Math.sin(a*Math.PI/180);
    const sz=3+Math.random()*5;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${color};left:${cx}px;top:${cy}px;animation-duration:${0.7+Math.random()*0.6}s;--to:translate(${tx}px,${ty}px)`;
    app.appendChild(p);
    setTimeout(()=>p.remove(),1800);
  }
}
async function launchFireworks(){
  const cols=['#f9a8d4','#fcd34d','#c4b5fd','#86efac','#93c5fd','#fb923c','#f472b6','#e8d8ff','#ffeaa7','#a78bfa'];
  document.getElementById('cannon-barrel').style.transform='translateX(-50%) rotate(-45deg)';
  await new Promise(r=>setTimeout(r,220));
  document.getElementById('cannon-barrel').style.transform='translateX(-50%) rotate(-18deg)';
  const pts=[[W/2,H*0.28],[W*0.28,H*0.22],[W*0.72,H*0.2],[W*0.14,H*0.38],[W*0.86,H*0.32],[W/2,H*0.12],[W*0.4,H*0.48],[W*0.6,H*0.42],[W*0.22,H*0.58],[W*0.78,H*0.52]];
  for(let i=0;i<pts.length;i++){
    await new Promise(r=>setTimeout(r,i===0?0:170));
    spawnBurst(pts[i][0],pts[i][1],cols[Math.floor(Math.random()*cols.length)]);
    if(i%2===0)spawnBurst(pts[i][0]+(Math.random()-0.5)*100,pts[i][1]+(Math.random()-0.5)*100,cols[Math.floor(Math.random()*cols.length)]);
  }
}
async function fireWish(){
  const input=document.getElementById('wish-input');
  const wish=input.value.trim();
  if(!wish){
    input.style.borderColor='#c84060';
    input.placeholder='please write a wish first, Akshu!';
    setTimeout(()=>{input.style.borderColor='#5a3888';input.placeholder='write your wish here...';},1200);
    return;
  }
  document.getElementById('fire-btn').disabled=true;
  await launchFireworks();
  await new Promise(r=>setTimeout(r,1200));
  document.getElementById('rv-wish').textContent='"'+wish+'"';
  document.getElementById('recv').classList.add('show');
}
function nextPage(){window.location.href='page7.html'}
async function boot(){
  await new Promise(r=>setTimeout(r,300));
  document.getElementById('title').classList.add('on');
  document.getElementById('cannon-scene').classList.add('on');
  document.getElementById('input-area').classList.add('on');
}
boot();
</script>
</body>
</html>
