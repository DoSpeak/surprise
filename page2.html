<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Akshuuuu's Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff69b4;--gold:#ffd700;--purple:#9b59b6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none;user-select:none}
#threeCanvas{position:fixed;inset:0;z-index:1}
#fxCanvas{position:fixed;inset:0;z-index:2;pointer-events:none}

/* CURSOR */
#cur1,#cur2{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur1{width:8px;height:8px;background:#fff;box-shadow:0 0 10px #fff,0 0 20px rgba(180,180,255,.9);transition:transform .1s}
#cur2{width:32px;height:32px;border:1.5px solid rgba(255,255,255,.3);transition:left .18s ease,top .18s ease}

/* HAND GESTURE OVERLAY */
#handCanvas{position:fixed;inset:0;z-index:50;pointer-events:none}

/* STATUS */
#status{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-size:.82rem;letter-spacing:4px;
  color:rgba(255,220,130,.9);z-index:30;
  background:rgba(5,0,18,.8);padding:8px 28px;border-radius:30px;
  border:1px solid rgba(255,190,60,.2);backdrop-filter:blur(16px);
  white-space:nowrap;transition:all .4s;pointer-events:none;
}

/* GESTURE GUIDE */
#gestureGuide{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:20px;z-index:30;pointer-events:none;
  background:rgba(0,0,0,.55);padding:10px 22px;border-radius:20px;
  border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);
}
.gIcon{text-align:center;font-size:.6rem;letter-spacing:2px;color:rgba(255,255,255,.35);font-family:monospace}
.gIcon span{display:block;font-size:1.2rem;margin-bottom:3px}

/* CHARGE METER */
#chargeWrap{
  position:fixed;top:65px;left:50%;transform:translateX(-50%);
  width:220px;z-index:30;display:none;pointer-events:none;
}
#chargeBg{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
#chargeFill{height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,#ff69b4,#ff1493,#ffd700,#ff69b4);
  background-size:300% 100%;animation:cShimmer .7s linear infinite;transition:width .08s}
@keyframes cShimmer{0%{background-position:0%}100%{background-position:300%}}
#chargeLabel{text-align:center;font-size:.58rem;letter-spacing:3px;
  color:rgba(255,150,180,.7);margin-top:5px;font-family:monospace}

/* CAMERA BTN */
#camBtn{
  position:fixed;top:18px;right:22px;z-index:40;
  background:rgba(8,0,25,.85);border:1px solid rgba(255,105,180,.35);
  color:rgba(255,140,180,.9);padding:10px 22px;border-radius:24px;
  cursor:pointer;font-size:.68rem;letter-spacing:2.5px;font-family:monospace;
  transition:all .3s;backdrop-filter:blur(12px);
}
#camBtn:hover{border-color:rgba(255,105,180,.8);box-shadow:0 0 20px rgba(255,80,150,.3)}

/* CAM PREVIEW */
#camWrap{
  position:fixed;bottom:80px;right:22px;width:200px;height:150px;
  border-radius:14px;overflow:hidden;display:none;z-index:60;
  border:1px solid rgba(255,105,180,.4);
  box-shadow:0 0 28px rgba(255,80,150,.25),0 8px 40px rgba(0,0,0,.9);
}
#camWrap::after{content:'✋ GESTURE CAM';position:absolute;top:0;left:0;right:0;
  text-align:center;font-size:.5rem;letter-spacing:3px;color:rgba(255,160,190,.6);
  padding:4px;background:rgba(0,0,0,.7);z-index:5;font-family:monospace;pointer-events:none}
#vid{display:block;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#camCv{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);z-index:3}

/* VOICE CAPTION */
#voiceCaption{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  max-width:600px;text-align:center;z-index:30;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;letter-spacing:2px;color:rgba(255,230,200,.9);
  background:rgba(0,0,0,.6);padding:12px 28px;border-radius:16px;
  border:1px solid rgba(255,200,100,.15);backdrop-filter:blur(12px);
  opacity:0;transition:opacity .6s;pointer-events:none;
  text-shadow:0 0 20px rgba(255,180,100,.4);
}
#voiceCaption.show{opacity:1}

/* PLANET LABELS */
.plabel{
  position:fixed;font-family:monospace;font-size:.58rem;letter-spacing:2px;
  pointer-events:none;z-index:15;
  transform:translate(-50%,-100%);padding:3px 8px;
  background:rgba(0,0,5,.65);border-radius:4px;white-space:nowrap;
  border:1px solid rgba(255,255,255,.06);
  transition:opacity .5s;opacity:0;color:rgba(255,255,255,.7);
}

/* SHOCKWAVE */
#shockRing{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0}

/* HEARTS */
#hRain{position:fixed;inset:0;pointer-events:none;z-index:490;overflow:hidden}
.hP{position:absolute;animation:hFloat linear forwards;opacity:0;will-change:transform}
@keyframes hFloat{
  0%{transform:translateY(108vh) scale(0) rotate(-15deg);opacity:0}
  6%{opacity:1}85%{opacity:.9}
  100%{transform:translateY(-12vh) scale(1.3) rotate(20deg);opacity:0}
}

/* BIRTHDAY OVERLAY */
#overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 45%,rgba(15,0,40,.97) 0%,rgba(0,0,6,1) 100%);
}
#overlay.show{opacity:1;pointer-events:all;animation:ovIn 1.6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes ovIn{
  0%{opacity:0;filter:blur(30px) brightness(4)}
  30%{filter:blur(6px) brightness(1.8)}
  100%{opacity:1;filter:blur(0) brightness(1)}
}
#starBurst{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 50%,rgba(100,0,70,.4) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 25% 35%,rgba(0,30,100,.25) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 75% 65%,rgba(70,0,100,.25) 0%,transparent 60%);
}
.photoOuter{position:relative;width:270px;height:270px;margin-bottom:28px;z-index:1}
.photoRingA{
  position:absolute;inset:-22px;border-radius:50%;
  background:conic-gradient(from 0deg,#ff69b4,#ffd700,#ff1493,#c000ff,#ffd700,#ff69b4);
  animation:spinA 3s linear infinite;filter:blur(1.5px);
}
@keyframes spinA{to{transform:rotate(360deg)}}
.photoRingB{
  position:absolute;inset:-10px;border-radius:50%;
  background:conic-gradient(from 180deg,transparent 55%,rgba(255,215,0,.7) 68%,transparent 80%);
  animation:spinA 2s linear infinite reverse;
}
.photoMask{position:absolute;inset:7px;border-radius:50%;background:radial-gradient(ellipse at 50% 45%,rgba(15,0,40,.97),rgba(0,0,6,1));z-index:1}
.photo{
  position:absolute;inset:7px;border-radius:50%;
  object-fit:cover;object-position:center 12%;
  width:calc(100% - 14px);height:calc(100% - 14px);z-index:2;
  animation:photoFloat 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 35px rgba(255,100,180,1));
}
@keyframes photoFloat{
  0%,100%{transform:scale(1) translateY(0);filter:drop-shadow(0 0 35px rgba(255,80,160,.9))}
  50%{transform:scale(1.05) translateY(-10px);filter:drop-shadow(0 0 60px rgba(255,20,147,1)) brightness(1.1)}
}
.bdayL1{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(1.4rem,3.5vw,2.4rem);
  letter-spacing:4px;line-height:1.4;text-align:center;
  background:linear-gradient(120deg,#ffd700,#fff8dc,#ff69b4,#ffd700);
  background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:tShimmer 2s linear infinite;
  filter:drop-shadow(0 0 18px rgba(255,200,80,.5));
}
.bdayL2{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(2rem,5.5vw,3.8rem);
  font-weight:700;letter-spacing:6px;margin-top:8px;text-align:center;
  background:linear-gradient(120deg,#ff69b4,#fff,#ffd700,#ff1493,#ff69b4);
  background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:tShimmer 1.6s linear infinite;
  filter:drop-shadow(0 0 30px rgba(255,80,160,.8));
}
@keyframes tShimmer{0%{background-position:0% 50%}100%{background-position:400% 50%}}
.bdaySub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;letter-spacing:5px;color:rgba(255,200,220,.55);
  margin-top:18px;text-transform:uppercase;
  animation:subUp 1s .8s both;
}
@keyframes subUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}


/* MUSIC NOTES */
.mNote{position:fixed;pointer-events:none;z-index:510;animation:noteUp linear forwards;opacity:0}
@keyframes noteUp{
  0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.5)}
  12%{opacity:1}78%{opacity:.9}
  100%{opacity:0;transform:translateY(-200px) rotate(30deg) scale(1.3)}
}

/* LOADING */
#loading{
  position:fixed;inset:0;z-index:1000;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity 1.5s;
}
#loading.hide{opacity:0;pointer-events:none}
.loadRing{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,105,180,.25);border-top-color:#ff69b4;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loadTxt{font-family:monospace;font-size:.68rem;letter-spacing:4px;color:rgba(255,180,200,.45)}

/* RESTART */




/* PAGE TRANSITION OVERLAY */
#pageTransition{
  position:fixed;inset:0;z-index:9000;
  background:radial-gradient(ellipse at 50% 50%, rgba(255,215,0,.15) 0%, #000 100%);
  opacity:0;pointer-events:none;transition:opacity .9s ease;
}
#pageTransition.active{opacity:1}




/* BIRTHDAY OVERLAY BUTTONS */
#overlayBtns{
  display:flex;gap:16px;margin-top:36px;z-index:1;
  opacity:0;animation:btnsReveal 1s 2.5s forwards;
}
@keyframes btnsReveal{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
#ovBtnRestore{
  padding:14px 28px;
  background:rgba(255,105,180,.08);
  border:1px solid rgba(255,105,180,.35);
  border-radius:30px;
  font-family:'Cormorant Garamond',serif;font-size:.82rem;letter-spacing:3px;
  color:rgba(255,160,190,.85);cursor:pointer;
  transition:all .35s;backdrop-filter:blur(12px);
  white-space:nowrap;
}
#ovBtnRestore:hover{
  background:rgba(255,105,180,.18);
  border-color:rgba(255,105,180,.75);
  color:#fff;
  box-shadow:0 0 22px rgba(255,80,150,.3);
}
#ovBtnContinue{
  padding:14px 32px;
  background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,105,180,.12));
  border:1px solid rgba(255,215,0,.4);
  border-radius:30px;
  font-family:'Cormorant Garamond',serif;font-size:.82rem;letter-spacing:3px;
  color:rgba(255,225,120,.9);cursor:pointer;
  transition:all .35s;backdrop-filter:blur(12px);
  white-space:nowrap;position:relative;overflow:hidden;
}
#ovBtnContinue::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,105,180,.18));
  opacity:0;transition:opacity .35s;
}
#ovBtnContinue:hover::before{opacity:1}
#ovBtnContinue:hover{
  border-color:rgba(255,215,0,.85);
  color:#ffd700;
  box-shadow:0 0 28px rgba(255,200,50,.35),0 0 60px rgba(255,200,50,.12);
  transform:scale(1.03);
}
.btnArrow{
  display:inline-block;margin-left:8px;
  transition:transform .3s;
}
#ovBtnContinue:hover .btnArrow{transform:translateX(5px)}

</style>
</head>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const R=(a,b)=>a+Math.random()*(b-a);
const PI2=Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

const threeCanvas=document.getElementById('threeCanvas');

renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;

scene.fog=new THREE.FogExp2(0x00000a,.000018);

// ═══════════════════════════════════════════════════════
// STAR FIELDS
// ═══════════════════════════════════════════════════════
function starField(n,rMin,rMax,huePairs,opacity,size){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3),col=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=R(rMin,rMax),t=R(0,PI2),p=Math.acos(R(-1,1));
    pos[i*3]=r*Math.sin(p)*Math.cos(t);pos[i*3+1]=r*Math.sin(p)*Math.sin(t);pos[i*3+2]=r*Math.cos(p);
    const hp=huePairs[Math.floor(Math.random()*huePairs.length)];
    const c=new THREE.Color().setHSL(hp[0],hp[1],R(.5,.98));
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size,vertexColors:true,transparent:true,opacity,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(pts);return pts;
}

// ═══════════════════════════════════════════════════════
// MILKY WAY
// ═══════════════════════════════════════════════════════
(()=>{
  // Core
  const n=12000,geo=new THREE.BufferGeometry(),p=new Float32Array(n*3),c=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=Math.pow(Math.random(),.45)*1600,t=R(0,PI2),ph=Math.acos(R(-1,1));
    p[i*3]=r*Math.sin(ph)*Math.cos(t);p[i*3+1]=r*Math.sin(ph)*Math.sin(t)*.14;p[i*3+2]=r*Math.cos(ph);
    const col=new THREE.Color().setHSL(.09+Math.random()*.05,.72,R(.55,.94));
    c[i*3]=col.r;c[i*3+1]=col.g;c[i*3+2]=col.b;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(p,3));
  geo.setAttribute('color',new THREE.BufferAttribute(c,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:1.6,vertexColors:true,transparent:true,opacity:.38,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true})));
  // Arms
  const an=28000,ageo=new THREE.BufferGeometry(),ap=new Float32Array(an*3),ac=new Float32Array(an*3);
  for(let i=0;i<an;i++){
    const arm=i%4,t=Math.pow(Math.random(),.56),r=900+t*15000;
    const spin=t*5+(arm/4)*PI2,sc=R(-1,1)*(1-t*.55)*r*.24,ang=spin+sc*.0004;
    ap[i*3]=Math.cos(ang)*r+sc*Math.cos(ang+1.57);ap[i*3+1]=R(-1,1)*r*.036+R(-50,50);ap[i*3+2]=Math.sin(ang)*r+sc*Math.sin(ang+1.57);
    const col=new THREE.Color().setHSL(lerp(.09,.64,t),.8+t*.12,R(.42,.88));
    ac[i*3]=col.r;ac[i*3+1]=col.g;ac[i*3+2]=col.b;
  }
  ageo.setAttribute('position',new THREE.BufferAttribute(ap,3));
  ageo.setAttribute('color',new THREE.BufferAttribute(ac,3));
  scene.add(new THREE.Points(ageo,new THREE.PointsMaterial({size:1.1,vertexColors:true,transparent:true,opacity:.22,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true})));
})();

function addGalaxy(x,y,z,rad,arms,n,rx,ry,rz,hue){

  comets.push({line,head,geo,mat,hMat,dir,life:1,TRAIL,hist:[],px:sx,py:sy,pz:sz});

function tickComets(){
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];c.life-=.006;c.mat.opacity=Math.sqrt(c.life)*.95;c.hMat.opacity=c.life;
    const nx=c.px+c.dir.x,ny=c.py+c.dir.y,nz=c.pz+c.dir.z;
    c.hist.unshift({x:nx,y:ny,z:nz});if(c.hist.length>c.TRAIL)c.hist.pop();
    c.head.position.set(nx,ny,nz);
    const pa=c.geo.attributes.position;pa.setXYZ(0,nx,ny,nz);
    c.hist.forEach((h,j)=>pa.setXYZ(j+1,h.x,h.y,h.z));pa.needsUpdate=true;
    c.px=nx;c.py=ny;c.pz=nz;
    if(c.life<=0){scene.remove(c.line);scene.remove(c.head);comets.splice(i,1);}
  }
}

let lastNarration=-1,narrationTimer=0;
const NARRATION_INTERVAL=8;
let speechSynth=window.speechSynthesis;
let currentUtter=null;
let voicesLoaded=false;
let selectedVoice=null;

function loadVoices(){
  const voices=speechSynth.getVoices();

  // Priority 1: Indian English voices (semi-Indian accent)
  const indianNames=['Rishi','Lekha','Veena','Neel','Google हिन्दी','Google Hindi',
    'Microsoft Heera','Microsoft Ravi','Aditi','Kalpana','Hemant'];
  for(const name of indianNames){
    const v=voices.find(v=>v.name.toLowerCase().includes(name.toLowerCase()));
    if(v){selectedVoice=v;break;}
  }

  // Priority 2: Indian locale en-IN
  if(!selectedVoice){
    selectedVoice=voices.find(v=>v.lang==='en-IN');
  }

  // Priority 3: Soft female voices with slight lilt (UK > AU > US)
  if(!selectedVoice){
    const soft=['Google UK English Female','Moira','Karen','Veena','Serena',
      'Fiona','Google Australian English','Tessa','Samantha'];
    for(const name of soft){
      const v=voices.find(v=>v.name.includes(name.split(' ')[0]));
      if(v){selectedVoice=v;break;}
    }
  }

  // Fallback: any English female
  if(!selectedVoice){
    selectedVoice=voices.find(v=>v.lang.startsWith('en')&&v.name.toLowerCase().includes('female'))
      ||voices.find(v=>v.lang.startsWith('en'))
      ||voices[0];
  }
  voicesLoaded=true;
}
speechSynth.onvoiceschanged=loadVoices;
loadVoices();

function speak(text){
  if(!speechSynth||collapsing)return;
  speechSynth.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  // Soft, sweet, semi-Indian cadence:
  // Slightly slower for warmth, pitch just above neutral for sweetness,
  // gentle volume — not sharp or loud
  utter.rate=0.82;    // slower = warmer, more melodic
  utter.pitch=1.18;   // slightly higher = sweet, feminine lilt
  utter.volume=0.92;  // soft, not blaring
  if(selectedVoice)utter.voice=selectedVoice;
  currentUtter=utter;
  speechSynth.speak(utter);
  showCaption(text);
}

function showCaption(text){
  const el=document.getElementById('voiceCaption');
  el.textContent=text;el.classList.add('show');
  clearTimeout(el._timer);
  el._timer=setTimeout(()=>el.classList.remove('show'),text.length*65+2000);
}

function triggerNarration(){
  let idx;
  do{idx=Math.floor(Math.random()*NARRATIONS.length);}while(idx===lastNarration);
  lastNarration=idx;
  speak(NARRATIONS[idx]);
}

  const thumbOut=lm[4].y<lm[3].y||Math.abs(lm[4].x-lm[2].x)>.08;
  const indexCurl=lm[8].y>lm[6].y;
  const middleCurl=lm[12].y>lm[10].y;
  const ringCurl=lm[16].y>lm[14].y;
  const pinkyCurl=lm[20].y>lm[18].y;
  if(indexUp&&!middleUp&&!ringUp&&!pinkyCurl&&lm[8].y<.3)return'pointUp';
  if(indexUp&&middleUp&&ringUp&&pinkyUp&&thumbOut)return'open';
  if(indexCurl&&middleCurl&&ringCurl&&pinkyCurl&&!thumbOut)return'fist';
  if(!indexUp&&middleCurl&&ringCurl&&pinkyCurl&&lm[8].y>.6)return'pointDown';
  return'open';
}

const fwP=[];
function launchFW(x,y){
  const h=Math.random()*360;
  for(let i=0;i<150;i++){
    const a=R(0,PI2),sp=Math.pow(Math.random(),.35)*R(3,13);
    fwP.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,decay:R(.009,.019),hue:h+R(-25,25),sat:Math.floor(R(70,100)),trail:[]});
  }
}
let fwIv=null;
function startFW(){fwIv=setInterval(()=>launchFW(R(innerWidth*.08,innerWidth*.92),R(innerHeight*.04,innerHeight*.52)),280);}
function tickFW(){
  if(!bShown){return;}
  fxCtx.fillStyle='rgba(0,0,0,.16)';fxCtx.fillRect(0,0,fxCanvas.width,fxCanvas.height);
  for(let i=fwP.length-1;i>=0;i--){
    const p=fwP[i];p.trail.push({x:p.x,y:p.y});if(p.trail.length>9)p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.vx*=.975;p.vy*=.975;p.life-=p.decay;
    if(p.life<=0){fwP.splice(i,1);continue;}
    if(p.trail.length>1){
      fxCtx.beginPath();fxCtx.moveTo(p.trail[0].x,p.trail[0].y);
      p.trail.forEach(pt=>fxCtx.lineTo(pt.x,pt.y));
      fxCtx.strokeStyle=`hsla(${p.hue},${p.sat}%,70%,${p.life*.55})`;fxCtx.lineWidth=1.4;fxCtx.stroke();
    }
    const sz=R(1.2,3)*p.life;
    fxCtx.beginPath();fxCtx.arc(p.x,p.y,sz,0,PI2);
    fxCtx.fillStyle=`hsla(${p.hue},${p.sat}%,${55+p.life*35}%,${p.life})`;fxCtx.fill();
    if(p.life>.35){
      fxCtx.beginPath();fxCtx.arc(p.x,p.y,sz*2.8,0,PI2);
      fxCtx.fillStyle=`hsla(${p.hue},${p.sat}%,95%,${(p.life-.35)*.2})`;fxCtx.fill();
    }
  }
}

let audioCtx=null;
function initAudio(){
  if(!audioCtx){
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();

}

async function ensureAudio(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended'||audioCtx.state==='interrupted'){
    await audioCtx.resume();
  }
  return audioCtx;
}

// ── INSTRUMENTS ────────────────────────────────────────────────────────────
function makeFlute(ac, freq, start, dur, vol){
  // Breathy sine with vibrato
  const o   = ac.createOscillator();
  const g   = ac.createGain();
  const vib = ac.createOscillator();
  const vg  = ac.createGain();
  vib.frequency.value = 5.5;
  vg.gain.setValueAtTime(0, start);
  vg.gain.linearRampToValueAtTime(freq*0.013, start + dur*0.35);
  vib.connect(vg); vg.connect(o.frequency);
  vib.start(start); vib.stop(start+dur+0.1);
  o.type = 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start+0.07);
  g.gain.setValueAtTime(vol*0.88, start+dur-0.1);
  g.gain.linearRampToValueAtTime(0, start+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start+dur+0.1);

  // Breath noise
  const noise = ac.createOscillator();
  const nf = ac.createBiquadFilter();
  const ng = ac.createGain();
  noise.type = 'sawtooth';
  noise.frequency.value = freq*3.97;
  nf.type = 'bandpass'; nf.frequency.value = freq*2; nf.Q.value = 10;
  ng.gain.setValueAtTime(0,start);
  ng.gain.linearRampToValueAtTime(0.018, start+0.06);
  ng.gain.setValueAtTime(0.018, start+dur-0.08);
  ng.gain.linearRampToValueAtTime(0, start+dur);
  noise.connect(nf); nf.connect(ng); ng.connect(ac.destination);
  noise.start(start); noise.stop(start+dur+0.1);
}

function makeCello(ac, freq, start, dur, vol){
  const o    = ac.createOscillator();
  const filt = ac.createBiquadFilter();
  const g    = ac.createGain();
  o.type = 'sawtooth'; o.frequency.value = freq;
  filt.type = 'lowpass'; filt.frequency.value = freq*3.2; filt.Q.value = 1.0;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start+0.22);
  g.gain.setValueAtTime(vol*0.78, start+dur-0.25);
  g.gain.linearRampToValueAtTime(0, start+dur);
  o.connect(filt); filt.connect(g); g.connect(ac.destination);
  o.start(start); o.stop(start+dur+0.1);
}

function makePad(ac, freqs, start, dur, vol){
  freqs.forEach(freq=>{
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start+0.6);
    g.gain.setValueAtTime(vol, start+dur-0.6);
    g.gain.linearRampToValueAtTime(0, start+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(start); o.stop(start+dur+0.1);
  });
}

let swProg=0,swActive=false,swWave2=0,swWave3=0;
function drawShockwave(){
  if(!swActive)return;
  swProg+=.018;swWave2+=.014;swWave3+=.01;
  const maxR=Math.hypot(innerWidth,innerHeight)*.75;
  [[swProg,.7,14],[swWave2,.5,8],[swWave3,.35,5]].forEach(([prog,opMult,lw])=>{
    if(prog>1)return;
    const r=prog*maxR,op=Math.max(0,1-prog)*opMult;
    fxCtx.save();
    fxCtx.strokeStyle=`rgba(255,210,80,${op})`;fxCtx.lineWidth=lw*(1-prog)+1.5;
    fxCtx.shadowColor=`rgba(255,160,40,${op})`;fxCtx.shadowBlur=50;
    fxCtx.beginPath();fxCtx.arc(innerWidth/2,innerHeight/2,r,0,PI2);fxCtx.stroke();
    fxCtx.restore();
  });
  if(swProg>=1&&swWave2>=1&&swWave3>=1)swActive=false;
}

  speak("Brace yourself! The entire universe is collapsing... just for you, Akshu!");
  setTimeout(()=>{swActive=true;swProg=0;swWave2=.0;swWave3=.0;},700);
  setTimeout(heartsRain,2000);
  labelEls.forEach(l=>{l.el.style.opacity='0';});
}

function showBirthday(){
  bShown=true;
  speechSynth.cancel();
  const ov=document.getElementById('overlay');ov.classList.add('show');

  // Play 500 Miles IMMEDIATELY — fire right away while audioCtx is warm
  // audioCtx was unlocked by the user gesture (heart/click/space) that triggered collapse
  songStopped=false;
  (async()=>{
    await ensureAudio();
    play500Miles();
  })();

  // Typewriters run independently — song doesn't wait for them
  setTimeout(()=>{
    typewriter(document.getElementById('bdayL1'),'Happy Birthday',55,()=>{
      typewriter(document.getElementById('bdayL2'),'Akshu! 🎂',60,()=>{
        setTimeout(()=>{
          speak("Happy birthday my sugarplum! From Rudra, Laukik, Yukta, Pawan... and the entire universe! You are jealous of me — no Akshu, we are ALL jealous of YOU!");
        },800);
      });
    });
  },600);

  startFW();
}

function resetUniverse(){
  speechSynth.cancel();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hRain').innerHTML='';
  document.getElementById('voiceCaption').classList.remove('show');
  fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  hCtx.clearRect(0,0,handCanvas.width,handCanvas.height);
  if(fwIv){clearInterval(fwIv);fwIv=null;}
  fwP.length=0;swActive=false;swProg=0;swWave2=0;swWave3=0;
  collapsing=false;bShown=false;colProg=0;heartFrames=0;
  sunLight.intensity=10;
  planetsState.forEach(p=>{p.angle=R(0,PI2);p.mesh.scale.setScalar(1);p.mesh.position.y=0;});
  document.getElementById('status').textContent='🌌 UNIVERSE RESTORED · AKSHUUUU\'S COSMOS LIVES ON';
  document.getElementById('chargeFill').style.width='0%';
  document.getElementById('chargeWrap').style.display='none';
  document.getElementById('bdayL1').innerHTML='';document.getElementById('bdayL2').innerHTML='';
  autoOn=true;tDist=340;
  stopSong();
  setTimeout(()=>speak("Welcome back to Akshu's universe! Explore away, and watch out for the panipuri nebula!"),1000);
}

// ═══════════════════════════════════════════════════════
// CURSOR
// ═══════════════════════════════════════════════════════
const cur1=document.getElementById('cur1'),cur2=document.getElementById('cur2');
let cx=0,cy=0,cx2=0,cy2=0;
window.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;});
function updateCursor(){
  cur1.style.left=cx+'px';cur1.style.top=cy+'px';
  cx2=lerp(cx2,cx,.16);cy2=lerp(cy2,cy,.16);
  cur2.style.left=cx2+'px';cur2.style.top=cy2+'px';
}

// ═══════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Camera
  if(autoOn&&!collapsing)autoA+=.00022;
  cRX+=(tRX-cRX)*.03;cRY+=(tRY-cRY)*.03;
  camDist+=(tDist-camDist)*.05;
  const ry=cRY+autoA;
  cam.position.set(
    Math.sin(ry)*camDist*Math.cos(cRX),
    Math.sin(cRX)*camDist,
    Math.cos(ry)*camDist*Math.cos(cRX)
  );
  cam.lookAt(0,0,0);

  if(!collapsing){
    // Planets
    planetsState.forEach(p=>{
      p.angle+=p.d.spd;
      p.mesh.position.x=Math.cos(p.angle)*p.d.dist;
      p.mesh.position.z=Math.sin(p.angle)*p.d.dist;
      p.mesh.rotation.y+=.007;
      p.mesh.children.forEach(ch=>{
        if(ch.userData.dist){
          ch.userData.angle+=ch.userData.speed;
          ch.position.set(Math.cos(ch.userData.angle)*ch.userData.dist,0,Math.sin(ch.userData.angle)*ch.userData.dist);
        }
      });
    });
    sunMesh.rotation.y+=.0015;
    sunMesh.scale.setScalar(1+Math.sin(t*1.7)*.02);
    sunLight.intensity=10+Math.sin(t*2.2)*2.2;
    galaxies.forEach((g,i)=>g.rotation.y+=.000022*(i%2?1:-1));
    tickComets();projectLabels();
    fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
    drawShockwave();
  } else {
    // DRAMATIC COLLAPSE
    colProg=Math.min(colProg+.004,1);
    const e=ease(colProg);
    const e2=ease(Math.min(colProg*1.3,1));

    // Planets spiral in chaotically
    planetsState.forEach((p,i)=>{
      const dist=p.origDist*(1-e);
      const chaos=e*i*.3;
      const sA=p.angle+t*(.5+i*.08)+chaos;
      p.mesh.position.x=Math.cos(sA)*dist;
      p.mesh.position.z=Math.sin(sA)*dist;
      p.mesh.position.y=Math.sin(t*4+i*1.6)*40*e;
      p.mesh.rotation.x+=.02*e;p.mesh.rotation.y+=.06+e*.35;p.mesh.rotation.z+=.01*e;
      p.mesh.scale.setScalar(Math.max(.005,1-e*.98));
      // Flash emissive
      if(p.mesh.material.emissiveIntensity!==undefined)p.mesh.material.emissiveIntensity=e2*5;
    });

    // Sun supernova
    const sunScale=1+e2*8;
    sunMesh.scale.setScalar(sunScale);
    sunLight.intensity=10+e2*120;

    // White flash at peak
    if(colProg>.85){
      fxCtx.fillStyle=`rgba(255,240,200,${(colProg-.85)*3*.4})`;
      fxCtx.fillRect(0,0,fxCanvas.width,fxCanvas.height);
    }

    // Camera pullback + extreme shake near end
    tDist=340+e*320;
    if(e>.6){
      const shk=(e-.6)*28;
      cam.position.x+=Math.sin(t*35)*shk;
      cam.position.y+=Math.cos(t*28)*shk*.6;
      cam.position.z+=Math.sin(t*22)*shk*.4;
    }

    fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
    if(colProg>.85){
      fxCtx.fillStyle=`rgba(255,240,200,${(colProg-.85)*3*.4})`;
      fxCtx.fillRect(0,0,fxCanvas.width,fxCanvas.height);
    }
    drawShockwave();
    tickFW();

    if(colProg>=1&&!bShown)showBirthday();
  }
  if(bShown)tickFW();
  updateCursor();
  renderer.render(scene,cam);
}

  setTimeout(()=>{
    document.getElementById('loading').classList.add('hide');
    setTimeout(()=>document.getElementById('loading').remove(),2000);
    animate();
    // Intro voice

      speak("Welcome to Akshu's universe! Enable gesture control for the full experience. You are definitely jealous of this universe!");
    },1200);
    // Auto-narration only when gesture camera is active
    setInterval(()=>{ if(gestureOn&&!collapsing&&!bShown) triggerNarration(); }, 9000);
  },1000);
});
